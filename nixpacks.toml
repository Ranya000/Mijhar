# إعداد النشر لـ Railway (Nixpacks) — رابط واحد يقدّم الواجهة والباكند معاً.
# لا يلزمك تعديله. فقط اضبط متغيّر ANTHROPIC_API_KEY في لوحة Railway.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = [
  "npm --prefix backend install",
  "npm --prefix frontend install",
  "npm --prefix frontend run build",
]

[start]
cmd = "npm --prefix backend start"
