# إعداد النشر لـ Render (بديل عن Railway) — رابط واحد يقدّم الواجهة والباكند.
# على Render: New → Blueprint → اربط المستودع، ثم أضِف قيمة ANTHROPIC_API_KEY.
services:
  - type: web
    name: majhar
    runtime: node
    plan: free
    buildCommand: npm --prefix backend install && npm --prefix frontend install && npm --prefix frontend run build
    startCommand: npm --prefix backend start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # تُدخلها يدوياً في لوحة Render (سرّية)
      - key: MAJHAR_MODEL
        value: claude-sonnet-5
